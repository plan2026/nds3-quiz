<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار مصطلحات التخطيط الاستراتيجي (NDS3) - نسخة عشوائية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 750px;
            padding: 30px;
        }
        
        h1 {
            color: #1a2a6c;
            margin-bottom: 5px;
            font-size: 28px;
            text-align: center;
        }
        
        .subtitle {
            color: #4a5568;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        
        .badge {
            background: #fdbb2d;
            color: #1a2a6c;
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            width: fit-content;
            margin-right: auto;
            margin-left: auto;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #1a2a6c, #b21f1f);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .question-container {
            margin-bottom: 30px;
            background: #f8fafc;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        
        .question-number {
            color: #b21f1f;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .question-text {
            font-size: 20px;
            color: #1a2a6c;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.5;
        }
        
        .english-term {
            color: #4a5568;
            font-size: 0.9em;
            margin-right: 10px;
            font-weight: normal;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .option {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .option:hover {
            background: #ebf4ff;
            border-color: #1a2a6c;
            transform: translateX(-5px);
        }
        
        .option.selected {
            background: #d4e6f1;
            border-color: #1a2a6c;
        }
        
        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }
        
        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }
        
        .option input[type="radio"] {
            margin-left: 15px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 16px;
            color: #2d3748;
        }
        
        .option strong {
            color: #1a2a6c;
            margin-left: 8px;
            font-size: 1.1em;
        }
        
        .explanation {
            background: #fff3cd;
            border-right: 4px solid #fdbb2d;
            padding: 18px;
            margin: 20px 0 10px;
            border-radius: 8px;
            display: none;
        }
        
        .explanation.show {
            display: block;
        }
        
        .explanation p {
            color: #856404;
            line-height: 1.7;
            font-size: 1.1em;
        }
        
        .button-container {
            display: flex;
            gap: 15px;
            justify-content: space-between;
            margin-top: 25px;
        }
        
        button {
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f);
            color: white;
            flex: 2;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(178, 31, 31, 0.4);
        }
        
        .btn-secondary {
            background: #718096;
            color: white;
            flex: 1;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #4a5568;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .results {
            text-align: center;
            padding: 30px;
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .score {
            font-size: 54px;
            color: #b21f1f;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .feedback {
            background: #f0f7ff;
            padding: 25px;
            border-radius: 15px;
            margin: 25px 0;
            text-align: right;
        }
        
        .answer-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        
        .answer-table th {
            background: #1a2a6c;
            color: white;
            padding: 12px;
            font-weight: 600;
        }
        
        .answer-table td {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
        }
        
        .answer-table tr:last-child td {
            border-bottom: none;
        }
        
        .answer-table tr:nth-child(even) {
            background: #f8fafc;
        }
        
        .correct-badge {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .incorrect-badge {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .reset-button {
            background: #fdbb2d;
            color: #1a2a6c;
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .reset-button:hover {
            background: #f39c12;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .question-text {
                font-size: 18px;
            }
            .option {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 اختبار مصطلحات التخطيط الاستراتيجي</h1>
        <div class="subtitle">(NDS3) - Strategic Planning Terms Quiz</div>
        <div class="badge">✅ إجابات عشوائية - تصحيح فوري</div>
        
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
        
        <div id="quiz-content"></div>
        
        <div class="button-container">
            <button class="btn-secondary" id="prevBtn" onclick="previousQuestion()" disabled>السابق</button>
            <button class="btn-primary" id="nextBtn" onclick="nextQuestion()">التالي</button>
        </div>
        
        <div id="results" class="results">
            <h2>🎉 نتيجة الاختبار</h2>
            <div class="score" id="score">0/10</div>
            <div class="feedback" id="feedback"></div>
            
            <h3 style="margin-top: 30px; color: #1a2a6c;">📊 تحليل الإجابات</h3>
            <table class="answer-table" id="answerTable">
                <thead>
                    <tr>
                        <th>السؤال</th>
                        <th>إجابتك</th>
                        <th>الإجابة الصحيحة</th>
                        <th>التقييم</th>
                    </tr>
                </thead>
                <tbody id="answerTableBody"></tbody>
            </table>
            
            <button class="reset-button" onclick="restartQuiz()">🔄 إعادة الاختبار (خلط جديد)</button>
        </div>
    </div>

    <script>
        // بنك الأسئلة الأساسي - اختبار مصطلحات التخطيط الاستراتيجي
        const rawQuestions = [
            {
                stem: "ما هو المصطلح الذي يصف الطموح بعيد المدى والهدف النهائي الذي تسعى الدولة للوصول إليه؟",
                opts: [
                    "الرسالة (Mission)",
                    "الرؤية (Vision)",
                    "القيم (Values)",
                    "المبادرات (Initiatives)"
                ],
                correctText: "الرؤية (Vision)",
                explanation: "الرؤية (Vision) هي الصورة المستقبلية الطموحة التي تسعى المنظمة أو الدولة لتحقيقها على المدى البعيد."
            },
            {
                stem: "مقارنة أداء قطر التعليمي مع أداء دولة رائدة مثل سنغافورة لاستخلاص أفضل الممارسات يسمى:",
                opts: [
                    "تحليل سوت (SWOT)",
                    "المقارنة المرجعية (Benchmarking)",
                    "تحليل بيستل (PESTEL)",
                    "تخصيص الموارد (Resource Allocation)"
                ],
                correctText: "المقارنة المرجعية (Benchmarking)",
                explanation: "المقارنة المرجعية (Benchmarking) هي عملية قياس ومقارنة الأداء مع المؤسسات الرائدة لتحسين الممارسات."
            },
            {
                stem: "الأداة التي تستخدم لتحليل البيئة الداخلية (قوة وضعف) والبيئة الخارجية (فرص وتهديدات) هي:",
                opts: [
                    "مؤشرات الأداء (KPIs)",
                    "التحليل الرباعي (SWOT)",
                    "الأهداف الذكية (SMART)",
                    "العائد على الاستثمار (ROI)"
                ],
                correctText: "التحليل الرباعي (SWOT)",
                explanation: "تحليل SWOT يفحص نقاط القوة (Strengths)، الضعف (Weaknesses)، الفرص (Opportunities)، والتهديدات (Threats)."
            },
            {
                stem: "النظام الذي يضمن وضوح المسؤولية والرقابة على تنفيذ القرارات الاستراتيجية يسمى:",
                opts: [
                    "التوافق الاستراتيجي (Alignment)",
                    "الحوكمة (Governance)",
                    "تخطيط السيناريوهات (Scenario Planning)",
                    "الرشاقة الاستراتيجية (Agility)"
                ],
                correctText: "الحوكمة (Governance)",
                explanation: "الحوكمة (Governance) هي إطار القواعد والعمليات التي تضمن الشفافية والمساءلة في اتخاذ القرارات."
            },
            {
                stem: "الاختيار بين بناء محطة طاقة شمسية أو بناء ملعب رياضي بسبب محدودية الميزانية يسمى:",
                opts: [
                    "الأثر (Impact)",
                    "المفاضلة (Trade-off)",
                    "سلاسل القيمة (Value Chain)",
                    "المخرجات (Outputs)"
                ],
                correctText: "المفاضلة (Trade-off)",
                explanation: "المفاضلة (Trade-off) تعني التخلي عن خيار لصالح آخر بسبب محدودية الموارد."
            },
            {
                stem: "الأدوات الرقمية التي تُستخدم لمتابعة التقدم نحو الأهداف بأرقام محددة وواضحة هي:",
                opts: [
                    "القيم (Values)",
                    "مؤشرات الأداء الرئيسية (KPIs)",
                    "أصحاب المصلحة (Stakeholders)",
                    "تحليل بيستل (PESTEL)"
                ],
                correctText: "مؤشرات الأداء الرئيسية (KPIs)",
                explanation: "KPIs هي مقاييس كمية تقيس مدى التقدم نحو تحقيق الأهداف الاستراتيجية."
            },
            {
                stem: "النظام الذي يعرض البيانات والنتائج بشكل مرئي ولحظي للقادة لاتخاذ قرارات سريعة يسمى:",
                opts: [
                    "الخطة التشغيلية (Operational Plan)",
                    "لوحة القياس (Dashboard)",
                    "خارطة الطريق (Roadmap)",
                    "إدارة المخاطر (Risk Management)"
                ],
                correctText: "لوحة القياس (Dashboard)",
                explanation: "لوحة القياس (Dashboard) تعرض مؤشرات الأداء الرئيسية بشكل مرئي ومباشر لدعم اتخاذ القرار."
            },
            {
                stem: "يشير مصطلح 'الاستدامة' (Sustainability) في التخطيط الاستراتيجي إلى:",
                opts: [
                    "تحقيق أسرع ربح ممكن في أقل وقت.",
                    "ضمان بقاء الأثر الإيجابي للمشاريع للأجيال القادمة.",
                    "إلغاء المشاريع القديمة واستبدالها دائماً.",
                    "زيادة عدد الموظفين في القطاع الحكومي."
                ],
                correctText: "ضمان بقاء الأثر الإيجابي للمشاريع للأجيال القادمة.",
                explanation: "الاستدامة تركز على تلبية احتياجات الحاضر دون المساس بقدرة الأجيال القادمة على تلبية احتياجاتها."
            },
            {
                stem: "عندما نصف هدفاً بأنه 'قابل للقياس' و 'موقوت بزمن'، فإننا نطبق معايير الأهداف الـ:",
                opts: [
                    "SWOT",
                    "SMART",
                    "PESTEL",
                    "ROI"
                ],
                correctText: "SMART",
                explanation: "SMART هي معايير: محددة (Specific)، قابلة للقياس (Measurable)، قابلة للتحقيق (Achievable)، ذات صلة (Relevant)، ومحددة زمنياً (Time-bound)."
            },
            {
                stem: "المصطلح الذي يصف 'المسافة' أو الفرق بين الوضع الحالي والوضع المنشود في الخطة هو:",
                opts: [
                    "الميزة التنافسية (Competitive Advantage)",
                    "الفجوة الاستراتيجية (Strategic Gap)",
                    "التغذية الراجعة (Feedback Loop)",
                    "عوامل النجاح الحرجة (Critical Success Factors)"
                ],
                correctText: "الفجوة الاستراتيجية (Strategic Gap)",
                explanation: "الفجوة الاستراتيجية تمثل الفرق بين الوضع الحالي والهدف المنشود، وتساعد في تحديد الجهود المطلوبة."
            }
        ];

        // دالة خلط المصفوفة
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // تحضير الأسئلة مع خلط عشوائي للخيارات
        function prepareQuestions() {
            return rawQuestions.map(q => {
                // نسخة من الخيارات
                const shuffledOpts = [...q.opts];
                // خلط الخيارات عشوائياً
                shuffleArray(shuffledOpts);
                
                // إيجاد المؤشر الجديد للإجابة الصحيحة
                const newCorrectIndex = shuffledOpts.indexOf(q.correctText);
                
                return {
                    question: q.stem,
                    options: shuffledOpts,
                    correct: newCorrectIndex,
                    explanation: q.explanation,
                    correctText: q.correctText
                };
            });
        }

        // خلط الأسئلة نفسها
        function shuffleQuestions(questionsArray) {
            return shuffleArray([...questionsArray]);
        }

        // تهيئة الأسئلة
        let questions = prepareQuestions();
        questions = shuffleQuestions(questions);

        // متغيرات الحالة
        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);
        let answered = new Array(questions.length).fill(false);
        let quizCompleted = false;

        // دالة تحويل رقم الخيار إلى حرف عربي
        function getLetter(index) {
            const letters = ['أ', 'ب', 'ج', 'د'];
            return letters[index] || 'أ';
        }

        function renderQuestion() {
            const content = document.getElementById('quiz-content');
            const q = questions[currentQuestion];
            
            let html = `
                <div class="question-container">
                    <div class="question-number">السؤال ${currentQuestion + 1} من ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="options">
            `;
            
            q.options.forEach((option, index) => {
                const isSelected = answers[currentQuestion] === index;
                const isAnswered = answered[currentQuestion];
                const isCorrect = isAnswered && index === q.correct;
                const isIncorrect = isAnswered && isSelected && index !== q.correct;
                
                let optionClass = 'option';
                if (isSelected) optionClass += ' selected';
                if (isCorrect) optionClass += ' correct';
                if (isIncorrect) optionClass += ' incorrect';
                
                html += `
                    <div class="${optionClass}" onclick="selectOption(${index})">
                        <input type="radio" name="question" value="${index}" ${isSelected ? 'checked' : ''} ${isAnswered ? 'disabled' : ''}>
                        <label><strong>${getLetter(index)}.</strong> ${option}</label>
                    </div>
                `;
            });
            
            html += `
                    </div>
                    <div class="explanation ${answered[currentQuestion] ? 'show' : ''}" id="explanation">
                        <p><strong>الشرح:</strong> ${q.explanation}</p>
                    </div>
                </div>
            `;
            
            content.innerHTML = html;
            
            // تحديث شريط التقدم
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
            
            // تحديث الأزرار
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            
            const nextBtn = document.getElementById('nextBtn');
            if (currentQuestion === questions.length - 1) {
                nextBtn.textContent = 'إنهاء';
            } else {
                nextBtn.textContent = 'التالي';
            }
        }

        function selectOption(optionIndex) {
            if (answered[currentQuestion] || quizCompleted) return;
            
            answers[currentQuestion] = optionIndex;
            answered[currentQuestion] = true;
            
            renderQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function showResults() {
            quizCompleted = true;
            
            // حساب النتيجة
            const correctAnswers = answers.reduce((count, answer, index) => {
                return count + (answer === questions[index].correct ? 1 : 0);
            }, 0);
            
            // إخفاء محتوى الاختبار
            document.getElementById('quiz-content').style.display = 'none';
            document.querySelector('.button-container').style.display = 'none';
            
            // عرض النتائج
            const resultsDiv = document.getElementById('results');
            resultsDiv.classList.add('show');
            
            document.getElementById('score').textContent = `${correctAnswers}/${questions.length}`;
            
            // إنشاء جدول الإجابات
            let tableBody = '';
            for (let i = 0; i < questions.length; i++) {
                const q = questions[i];
                const userAnswer = answers[i];
                const userAnswerLetter = userAnswer !== null ? getLetter(userAnswer) : 'لم تجب';
                const correctLetter = getLetter(q.correct);
                const isCorrect = userAnswer === q.correct;
                
                tableBody += `
                    <tr>
                        <td><strong>${i + 1}</strong></td>
                        <td>${userAnswerLetter}</td>
                        <td>${correctLetter}</td>
                        <td>${isCorrect ? '✅ صحيح' : '❌ خطأ'}</td>
                    </tr>
                `;
            }
            
            document.getElementById('answerTableBody').innerHTML = tableBody;
            
            // تحليل الأداء
            let feedbackText = '';
            if (correctAnswers >= 9) {
                feedbackText = '🌟 ممتاز! فهم عميق لمصطلحات التخطيط الاستراتيجي.';
            } else if (correctAnswers >= 7) {
                feedbackText = '📈 جيد جداً! لديك فهم جيد للمصطلحات.';
            } else if (correctAnswers >= 5) {
                feedbackText = '📚 مقبول. تحتاج إلى مراجعة بعض المصطلحات.';
            } else {
                feedbackText = '🔄 ننصح بمراجعة المصطلحات مرة أخرى للاستفادة بشكل أفضل.';
            }
            
            document.getElementById('feedback').innerHTML = `
                <p style="font-size: 1.2em;">${feedbackText}</p>
                <p style="margin-top: 15px; color: #1a2a6c;">لقد أجبت بشكل صحيح على ${correctAnswers} من أصل ${questions.length} أسئلة.</p>
                <p style="margin-top: 10px; font-size: 0.9em; color: #4a5568;">✨ تم توزيع الإجابات الصحيحة عشوائياً على (أ، ب، ج، د)</p>
            `;
        }

        function restartQuiz() {
            // إعادة إنشاء الأسئلة بخلط جديد
            questions = prepareQuestions();
            questions = shuffleQuestions(questions);
            
            currentQuestion = 0;
            answers = new Array(questions.length).fill(null);
            answered = new Array(questions.length).fill(false);
            quizCompleted = false;
            
            document.getElementById('quiz-content').style.display = 'block';
            document.querySelector('.button-container').style.display = 'flex';
            document.getElementById('results').classList.remove('show');
            
            renderQuestion();
        }

        // بدء الاختبار
        renderQuestion();
    </script>
</body>
</html>
